const DASHBOARD_CODE = `# api.py — FastAPI wrapper
from fastapi import FastAPI
from pydantic import BaseModel

app = FastAPI(title="Amazon NLP API")

class Ticket(BaseModel):
    text  : str
    top_k : int = 3

@app.post("/classify")
def classify(req: Ticket):
    result = rag_pipeline(req.text, req.top_k)
    return {
        "topic"     : result["topic"],
        "sentiment" : result["sentiment"],
        "priority"  : result["priority"],
        "action"    : result["action"],
        "retrieved" : result["retrieved"],
    }

@app.get("/clusters/summary")
def clusters():
    return {
        str(cl): {
            "count"    : int((df_work["cluster"] == cl).sum()),
            "keywords" : cluster_keywords[cl],
            "avg_rating": round(float(
                df_work[df_work["cluster"]==cl]["rating"].mean()), 2),
        }
        for cl in sorted(df_work["cluster"].unique())
    }

@app.get("/search")
def search(query: str, top_k: int = 5):
    results = semantic_search(query, top_k=top_k)
    return results.to_dict(orient="records")`;

const SLACK_CODE = `# slack_bot.py — Slack Bolt integration
from slack_bolt import App

app = App(token=SLACK_BOT_TOKEN)

def post_alert(ticket_text):
    result = rag_pipeline(ticket_text)
    if result["priority"] != "HIGH":
        return

    similar = "\\n".join([
        "- [" + str(r["similarity"]) + "] " + r["text"][:55]
        for r in result["retrieved"]
    ])
    blocks = [
        {"type": "header", "text": {
            "type": "plain_text",
            "text": "HIGH - " + result["topic"]
        }},
        {"type": "section", "text": {
            "type": "mrkdwn",
            "text": "*Ticket:* " + ticket_text[:100] + "\\n" +
                    "*Sentiment:* " + result["sentiment"] + "\\n" +
                    "*Action:* " + result["action"]
        }},
        {"type": "section", "text": {
            "type": "mrkdwn",
            "text": "*Similar past tickets:*\\n" + similar
        }},
    ]
    app.client.chat_postMessage(
        channel="#support-alerts",
        blocks=blocks,
    )

@app.command("/search")
def handle_search(ack, respond, command):
    ack()
    df_r = semantic_search(command["text"], top_k=5)
    lines = [
        "[" + str(r["similarity"]) + "] " + r["review"][:55]
        for _, r in df_r.iterrows()
    ]
    respond("Results for '" + command["text"] + "':\\n" + "\\n".join(lines))`;

const CRM_CODE = `# lambda_handler.py — AWS Lambda for Freshdesk
import json, requests

FRESHDESK = "https://yourcompany.freshdesk.com/api/v2"
FD_KEY    = "your_freshdesk_api_key"
NLP_API   = "https://your-api.com/classify"

PRIORITY_MAP = {"LOW": 1, "MEDIUM": 2, "HIGH": 4}

def lambda_handler(event, context):
    body = json.loads(event["body"])
    ticket_id = body["freshdesk_webhook"]["ticket_id"]
    text = (body["freshdesk_webhook"]["ticket_subject"]
            + " "
            + body["freshdesk_webhook"]["ticket_description"])

    resp   = requests.post(NLP_API, json={"text": text, "top_k": 3})
    result = resp.json()

    requests.put(
        FRESHDESK + "/tickets/" + str(ticket_id),
        auth=(FD_KEY, "X"),
        json={
            "priority": PRIORITY_MAP[result["priority"]],
            "tags":     [result["topic"].replace(" ", "_")],
            "custom_fields": {
                "cf_ai_topic"    : result["topic"],
                "cf_ai_sentiment": result["sentiment"],
                "cf_ai_action"   : result["action"],
            },
        }
    )
    return {"statusCode": 200, "body": json.dumps(result)}`;

function CopyButton(props) {
  var code = props.code;
  var _s = useState(false);
  var copied = _s[0];
  var setCopied = _s[1];
  return (
    <button
      onClick={function() {
        navigator.clipboard.writeText(code);
        setCopied(true);
        setTimeout(function() { setCopied(false); }, 2000);
      }}
      style={{
        background: copied ? T.green : T.dim,
        color: copied ? "#000" : T.muted,
        border: "none", borderRadius: 3,
        padding: "4px 12px", fontSize: 11,
        cursor: "pointer", fontFamily: "JetBrains Mono, monospace",
        transition: "all 0.2s",
      }}>
      {copied ? "Copied!" : "Copy"}
    </button>
  );
}

function FlowDiagram(props) {
  var nodes = props.nodes;
  var color = props.color;
  return (
    <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 4, padding: "16px 20px", background: "#080a0d", borderRadius: 6 }}>
      {nodes.map(function(node, i) {
        return (
          <span key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{
              padding: "5px 10px", borderRadius: 4, fontSize: 11,
              fontFamily: "JetBrains Mono, monospace",
              background: i === nodes.length - 1 ? color + "20" : T.dim,
              color: i === nodes.length - 1 ? color : i === 0 ? "#fff" : T.muted,
              border: "1px solid " + (i === nodes.length - 1 ? color : T.border),
            }}>{node}</span>
            {i < nodes.length - 1 && <span style={{ color: T.border, fontSize: 12 }}>→</span>}
          </span>
        );
      })}
    </div>
  );
}

function BusinessIntegration() {
  var _sm = useState(false);
  var mounted = _sm[0];
  var setMounted = _sm[1];
  var _sa = useState("dashboard");
  var active = _sa[0];
  var setActive = _sa[1];
  var _sc = useState(false);
  var showCode = _sc[0];
  var setShowCode = _sc[1];

  useEffect(function() { setTimeout(function() { setMounted(true); }, 60); }, []);

  var integ = INTEGRATIONS.find(function(i) { return i.id === active; });

  return (
    <div style={{ background: T.bg, minHeight: "100vh", fontFamily: "Outfit, sans-serif", color: T.text, opacity: mounted ? 1 : 0, transition: "opacity 0.4s" }}>

      {/* Header */}

        {/* Code block */}

            { v: "0",      l: "Training labels", s: "needed"         },
            { v: "inf",    l: "Scale",           s: "stateless API"  },
          ].map(function(c) {
            return (
              <div key={c.l} style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 6, padding: "12px 14px", borderBottom: "2px solid " + integ.color }}>

}
